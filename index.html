<script>
// Replace these with YOUR actual values from EmailJS dashboard
const SERVICE_ID    = 'YOUR_SERVICE_ID_HERE';      // e.g. service_abc123
const TEMPLATE_ID   = 'YOUR_TEMPLATE_ID_HERE';     // e.g. template_def456
const PUBLIC_KEY    = 'YOUR_PUBLIC_KEY_HERE';      // e.g. user_xyz78910abc

// Initialize EmailJS
if (typeof emailjs !== 'undefined') {
  emailjs.init(PUBLIC_KEY);
} else {
  console.error('EmailJS SDK failed to load – check <script src> URL or internet');
}

document.getElementById('order-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const formMessage = document.getElementById('form-message');
  formMessage.style.display = 'block';
  formMessage.className = '';
  formMessage.textContent = 'Sending order...';

  const templateParams = {
    user_name:   document.getElementById('user_name').value,
    user_phone:  document.getElementById('user_phone').value || 'Not provided',
    user_email:  document.getElementById('user_email').value,
    message:     document.getElementById('message').value,
    timestamp:   new Date().toLocaleString(),
    to_email:    'jlee@globalhvacsolutions.com'   // Add this if template has {{to_email}}
  };

  console.log('Sending with params:', templateParams); // Debug: see what's sent

  emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
    .then(function(response) {
      console.log('SUCCESS!', response.status, response.text);
      formMessage.className = 'success';
      formMessage.textContent = 'Order sent successfully! Jeff will contact you soon.';
      document.getElementById('order-form').reset();
      setTimeout(() => { formMessage.style.display = 'none'; }, 8000);
    }, function(error) {
      console.error('EmailJS failed:', error);
      formMessage.className = 'error';
      formMessage.innerHTML = 'Failed to send order.<br>Error: ' + (error.text || error.statusText || 'Unknown') + '<br>Please try again or call (409) 749-0650.';
    });
});
</script>
