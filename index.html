<!-- Add this to <head> if not already there -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Improved CSS for iPhone/mobile -->
<style>
  body {
    font-family: -apple-system, BlinkMacOSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 0;
    background: #f8f9fa;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem;
  }

  /* Product grid - already responsive */
  .parts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  .part-card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.2s;
  }
  .part-card:hover {
    transform: translateY(-5px);
  }

  .part-img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: #f0f4f8;
    padding: 1rem;
  }

  .part-info {
    padding: 1rem;
  }

  .part-title {
    margin: 0;
    font-size: 1.3rem;
    color: #003366;
  }

  .part-price {
    font-size: 1.4rem;
    font-weight: bold;
    color: #d32f2f;
    margin: 0.5rem 0;
  }

  .part-stock {
    font-size: 0.95rem;
    margin-bottom: 1rem;
  }
  .part-stock.low { color: #f57c00; }

  button {
    background: #003366;
    color: white;
    border: none;
    width: 100%;
    padding: 1rem;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    border-radius: 0 0 12px 12px;
    transition: background 0.2s;
    min-height: 48px; /* Better touch target */
  }
  button:hover { background: #005599; }

  /* Cart Icon - always visible on mobile */
  #cart-icon {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #003366;
    color: white;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    z-index: 1000;
  }
  #cart-count {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    color: white;
    border-radius: 50%;
    min-width: 28px;
    height: 28px;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 6px;
  }

  /* Cart Modal - full-screen feel on mobile */
  #cart-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  #cart-content {
    background: white;
    padding: 1.5rem;
    border-radius: 16px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  @media (max-width: 768px) {
    .parts-grid {
      grid-template-columns: 1fr;
      gap: 1.2rem;
    }
    .part-img {
      height: 160px;
    }
    button {
      font-size: 1.2rem;
      padding: 1.2rem;
    }
    #cart-icon {
      width: 80px;
      height: 80px;
      bottom: 15px;
      right: 15px;
    }
    #cart-content {
      padding: 1.2rem;
      border-radius: 0;
      max-height: 100vh;
    }
  }
</style>

<!-- Cart HTML (place near end of <body>) -->
<div id="cart-icon">
  🛒
  <span id="cart-count">0</span>
</div>

<div id="cart-modal">
  <div id="cart-content">
    <h2 style="text-align:center; color:#003366; margin-top:0;">Your Cart</h2>
    <div id="cart-items"></div>
    <p id="cart-empty" style="text-align:center; color:#777; padding:2rem 0; display:none;">Your cart is empty.</p>
    <button id="close-cart" style="margin-top:1rem; background:#ccc; color:#333; padding:1rem; border:none; width:100%; border-radius:8px; cursor:pointer; font-size:1.1rem;">Close</button>
    <button id="send-cart" style="margin-top:1rem; background:#003366; color:white; padding:1rem; border:none; width:100%; border-radius:8px; cursor:pointer; font-size:1.1rem; font-weight:bold;">Send Cart as Order Request</button>
  </div>
</div>

<!-- JavaScript (cart + form integration) -->
<script>
// Cart logic (same as before but optimized)
let cart = [];

const cartIcon = document.getElementById('cart-icon');
const cartModal = document.getElementById('cart-modal');
const cartItemsDiv = document.getElementById('cart-items');
const cartEmpty = document.getElementById('cart-empty');
const cartCount = document.getElementById('cart-count');
const closeCart = document.getElementById('close-cart');
const sendCartBtn = document.getElementById('send-cart');
const messageTextarea = document.getElementById('message');

function updateCartCount() {
  const total = cart.reduce((sum, item) => sum + item.quantity, 0);
  cartCount.textContent = total;
}

function updateCartDisplay() {
  cartItemsDiv.innerHTML = '';
  if (cart.length === 0) {
    cartEmpty.style.display = 'block';
    sendCartBtn.style.display = 'none';
    return;
  }
  cartEmpty.style.display = 'none';
  sendCartBtn.style.display = 'block';

  cart.forEach(item => {
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.innerHTML = `<span>${item.name} × ${item.quantity}</span><span>${item.price}</span>`;
    cartItemsDiv.appendChild(div);
  });
}

cartIcon.addEventListener('click', () => {
  updateCartDisplay();
  cartModal.style.display = 'flex';
});

closeCart.addEventListener('click', () => cartModal.style.display = 'none');
cartModal.addEventListener('click', e => {
  if (e.target === cartModal) cartModal.style.display = 'none';
});

sendCartBtn.addEventListener('click', () => {
  if (cart.length === 0) return;

  const cartText = cart.map(item => `- ${item.name} – Qty ${item.quantity} (${item.price})`).join('\n');
  if (messageTextarea) {
    messageTextarea.value = `Cart contents:\n${cartText}\n\nExtra notes:\n`;
    messageTextarea.focus();
    document.getElementById('order-form')?.scrollIntoView({ behavior: 'smooth' });
    cartModal.style.display = 'none';
    alert('Cart items added to order form – complete details and send!');
  } else {
    alert('Order form not found. Cart:\n' + cartText);
  }
});

function addToCart(partName, price = '—') {
  const existing = cart.find(item => item.name === partName);
  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({ name: partName, quantity: 1, price });
  }
  updateCartCount();
  // Optional: brief toast instead of alert
  // alert(`${partName} added!`);
}
</script>
