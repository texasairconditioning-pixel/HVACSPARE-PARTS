<!-- EmailJS SDK - required for sending -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- Order / Quote Request Form -->
<section style="margin: 3rem auto; max-width: 600px; padding: 0 1rem;">
  <h2 style="text-align: center; color: #003366; margin-bottom: 1.5rem;">Request Quote or Order Parts</h2>
  
  <p style="text-align: center; color: #444; margin-bottom: 2rem; font-size: 1.1rem;">
    Please provide your contact details and list the parts you're interested in.<br>
    Example: "Run Capacitor 45+5 MFD – Qty 5" or "Blower Motor – Qty 1"
  </p>

  <form id="order-form" style="background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);">
    
    <div style="margin-bottom: 1.2rem;">
      <label for="user_name" style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #003366;">Your Name *</label>
      <input type="text" id="user_name" required placeholder="Jeffery W Lee" style="width: 100%; padding: 0.9rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
    </div>

    <div style="margin-bottom: 1.2rem;">
      <label for="user_email" style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #003366;">Your Email *</label>
      <input type="email" id="user_email" required placeholder="yourname@gmail.com" style="width: 100%; padding: 0.9rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
    </div>

    <div style="margin-bottom: 1.2rem;">
      <label for="user_phone" style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #003366;">Phone Number</label>
      <input type="tel" id="user_phone" placeholder="(409) 749-0650" style="width: 100%; padding: 0.9rem; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem;">
    </div>

    <div style="margin-bottom: 1.2rem;">
      <label for="message" style="display: block; margin-bottom: 0.4rem; font-weight: 600; color: #003366;">Parts, Quantities & Notes *</label>
      <textarea id="message" rows="5" required placeholder="Examples:&#10;- Run Capacitor 45+5 MFD – Qty 5&#10;- Blower Wheel Assembly – Qty 1&#10;Any special requirements or questions?" style="width: 100%; padding: 0.9rem; border: 1px solid #ccc; border-radius: 6px; resize: vertical; font-size: 1rem;"></textarea>
    </div>

    <button type="submit" style="background: #003366; color: white; border: none; width: 100%; padding: 1.1rem; font-size: 1.15rem; font-weight: bold; cursor: pointer; border-radius: 8px;">
      Send Request
    </button>

    <div id="form-message" style="margin-top: 1.5rem; padding: 1rem; border-radius: 8px; text-align: center; font-weight: 500; display: none;"></div>
  </form>
</section>

<!-- EmailJS Sending Script -->
<script>
// Your EmailJS credentials
const SERVICE_ID   = 'service_szh4rp4';
const TEMPLATE_ID  = 'TEMPLATE_Q307076';
const PUBLIC_KEY   = 'HLJ_hayCPy6htDbpu';

// Initialize EmailJS
emailjs.init(PUBLIC_KEY);

document.getElementById('order-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const status = document.getElementById('form-message');
  status.style.display = 'block';
  status.style.background = '#fff3cd';
  status.style.color = '#856404';
  status.textContent = 'Sending your request... Please wait.';

  const params = {
    user_name:   document.getElementById('user_name').value.trim(),
    user_email:  document.getElementById('user_email').value.trim(),
    user_phone:  document.getElementById('user_phone').value.trim() || 'Not provided',
    message:     document.getElementById('message').value.trim(),
    timestamp:   new Date().toLocaleString()
  };

  console.log('Sending data:', params); // Check browser console (F12) to see this

  emailjs.send(SERVICE_ID, TEMPLATE_ID, params)
    .then((response) => {
      console.log('Email sent successfully!', response.status, response.text);
      status.style.background = '#d4edda';
      status.style.color = '#155724';
      status.textContent = 'Request sent successfully! Jeff will contact you soon.';
      e.target.reset();
    })
    .catch((error) => {
      console.error('EmailJS send failed:', error);
      status.style.background = '#f8d7da';
      status.style.color = '#721c24';
      status.innerHTML = 'Failed to send.<br>Error: ' + (error.text || error.message || 'Unknown – check F12 console') + '<br>Please call (409) 749-0650 if needed.';
    });
});
</script>
